<ng-container *ngIf="userRole">
  <header class="dir-header">
    <a routerLink="/" class="dir-logo">
      <img src="/logo2.png" class="dir-logo-icon" alt="Escu Logo">
      <span>Gestão escolar simplificada</span>
    </a>
    <div class="dir-header-right">
      <div class="dir-user-info">
        <span class="dir-user-name">{{ userName }}</span>
        <span class="dir-user-email">{{ userEmail }}</span>
        <span class="dir-user-role">{{ roleLabel }}</span>
      </div>
      <button class="dir-btn-logout" (click)="logout()">Sair</button>
    </div>
  </header>

  <nav class="dir-nav">
    <div class="dir-nav-inner">

      <ng-container *ngIf="userRole === 'professor'">
        <a class="dir-nav-item" routerLink="/dashboard" routerLinkActive="dir-nav-item--active" [routerLinkActiveOptions]="{exact: true}"><span>🏠</span> Painel</a>
        <a class="dir-nav-item" routerLink="/registro" routerLinkActive="dir-nav-item--active"><span>✏️</span> Registrar</a>
        <a class="dir-nav-item" routerLink="/ocorrencias" routerLinkActive="dir-nav-item--active"><span>📋</span> Ocorrências</a>
        <a class="dir-nav-item" routerLink="/agendamento-equipamentos" routerLinkActive="dir-nav-item--active"><span>📅</span> Agendamentos</a>
      </ng-container>

      <ng-container *ngIf="userRole === 'coordenacao'">
        <a class="dir-nav-item" routerLink="/dashboard" routerLinkActive="dir-nav-item--active" [routerLinkActiveOptions]="{exact: true}"><span>🏠</span> Painel</a>
        <a class="dir-nav-item" routerLink="/ocorrencias" routerLinkActive="dir-nav-item--active"><span>📋</span> Ocorrências</a>
        <a class="dir-nav-item" routerLink="/agendamento-equipamentos" routerLinkActive="dir-nav-item--active"><span>📅</span> Agendamentos</a>
      </ng-container>

      <ng-container *ngIf="userRole === 'direcao'">
        <a class="dir-nav-item" routerLink="/dashboard" routerLinkActive="dir-nav-item--active" [routerLinkActiveOptions]="{exact: true}"><span>🏠</span> Painel</a>
        <a class="dir-nav-item" routerLink="/ocorrencias" routerLinkActive="dir-nav-item--active"><span>📋</span> Ocorrências</a>
        <a class="dir-nav-item" routerLink="/secretaria/dashboard" routerLinkActive="dir-nav-item--active"><span>🗂️</span> Secretaria</a>
        <a class="dir-nav-item" routerLink="/agendamento-equipamentos" routerLinkActive="dir-nav-item--active"><span>📅</span> Agendamentos</a>
      </ng-container>

      <ng-container *ngIf="userRole === 'secretaria'">
        <a class="dir-nav-item" routerLink="/dashboard" routerLinkActive="dir-nav-item--active" [routerLinkActiveOptions]="{exact: true}"><span>🏠</span> Painel</a>
        <a class="dir-nav-item" routerLink="/secretaria/dashboard" routerLinkActive="dir-nav-item--active"><span>🗂️</span> Secretaria</a>
      </ng-container>

    </div>
  </nav>
</ng-container>
