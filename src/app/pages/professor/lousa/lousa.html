<div class="lousa-wrapper"
  [class.tema-branca]="tema === 'branca'"
  [class.tema-verde]="tema === 'verde'"
  [class.tema-preta]="tema === 'preta'"
  [class.lousa-wrapper--tela-cheia]="emTelaCheia">

  <!-- Input de arquivo (oculto) -->
  <input type="file" #arquivoInput
    accept="image/*,.pdf"
    style="display:none"
    (change)="onArquivoSelecionado($event)" />

  <!-- ── Toolbar (oculta no modo projetor) ── -->
  <div class="lousa-toolbar" *ngIf="!modoProjetor">

    <button class="tb-btn tb-btn--back" (click)="irParaDiario()" title="Voltar ao Diário">
      ← Diário
    </button>

    <div class="tb-sep"></div>

    <!-- Temas -->
    <div class="tb-group">
      <span class="tb-label">Fundo:</span>
      <button class="tema-btn"
        *ngFor="let t of TEMAS"
        [class.tema-btn--ativo]="tema === t.valor"
        (click)="onTemaChange(t.valor)"
        [title]="t.label">
        {{ t.label }}
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Tamanho da fonte -->
    <div class="tb-group">
      <span class="tb-label">Texto:</span>
      <button class="tamanho-btn"
        *ngFor="let t of TAMANHOS"
        [class.tamanho-btn--ativo]="tamanhoFonte === t.valor"
        (click)="onTamanhoChange(t.valor)">
        {{ t.label }}
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Modo de edição -->
    <div class="tb-group">
      <button class="modo-btn"
        [class.modo-btn--ativo]="modoEdicao === 'texto'"
        (click)="modoEdicao === 'desenho' && toggleModoEdicao()"
        [title]="bgTipo ? 'Navegar arquivo' : 'Digitar texto'">
        {{ bgTipo ? '👆 Navegar' : '✏️ Digitar' }}
      </button>
      <button class="modo-btn"
        [class.modo-btn--ativo]="modoEdicao === 'desenho'"
        (click)="modoEdicao === 'texto' && toggleModoEdicao()"
        [title]="bgTipo ? 'Anotar sobre o arquivo' : 'Desenho à mão livre'">
        🖌️ {{ bgTipo ? 'Anotar' : 'Mão livre' }}
      </button>
    </div>

    <div class="tb-sep"></div>

    <!-- Ações -->
    <button class="tb-btn tb-btn--danger" (click)="limpar()" title="Limpar lousa">
      🗑️ Limpar
    </button>

    <div class="tb-sep"></div>

    <!-- Arquivo de fundo -->
    <button class="tb-btn" (click)="onAbrirArquivo()" *ngIf="!bgTipo"
      title="Carregar imagem ou PDF como fundo para anotar">
      📂 Arquivo
    </button>
    <ng-container *ngIf="bgTipo">
      <span class="tb-fundo-badge">{{ bgTipo === 'imagem' ? '🖼️' : '📄' }} Fundo ativo</span>
      <button class="tb-btn tb-btn--danger" (click)="removerFundo()" title="Remover arquivo de fundo">✕ Fundo</button>
    </ng-container>

    <button class="tb-btn" (click)="projetarNovaJanela()" title="Abrir em nova janela para projetar">
      ↗️ Projetar
    </button>

    <button class="tb-btn tb-btn--fullscreen" (click)="toggleTelaCheia()" title="Tela cheia">
      {{ emTelaCheia ? '⤡ Sair' : '⛶ Tela Cheia' }}
    </button>

  </div>

  <!-- ── Quadro + moldura ── -->
  <div class="lousa-frame-area">

    <div class="lousa-frame">
      <div class="lousa-conteudo" [class.lousa-conteudo--tem-fundo]="bgTipo">

        <!-- Fundo: imagem (sincronizado com o projetor) -->
        <img *ngIf="bgTipo === 'imagem' && bgImagemUrl"
          class="lousa-bg-imagem"
          [src]="bgImagemUrl"
          alt="Fundo da lousa" />

        <!-- Fundo: PDF (somente janela local; use 👆 Navegar para trocar de página) -->
        <iframe *ngIf="bgTipo === 'pdf' && bgPdfUrl"
          class="lousa-bg-pdf"
          [class.lousa-bg-pdf--navegando]="modoEdicao === 'texto'"
          [src]="bgPdfUrl"
          title="PDF de fundo"></iframe>

        <textarea
          #lousaArea
          class="lousa-area"
          [class.fonte-normal]="tamanhoFonte === 'normal'"
          [class.fonte-grande]="tamanhoFonte === 'grande'"
          [class.fonte-enorme]="tamanhoFonte === 'enorme'"
          [class.lousa-area--oculta]="!!bgTipo"
          [readonly]="modoProjetor || modoEdicao === 'desenho'"
          [(ngModel)]="texto"
          (ngModelChange)="!modoProjetor && onTextoChange()"
          placeholder="Comece a escrever na lousa... 🖊️"
          spellcheck="false"
          autocomplete="off"
        ></textarea>

        <canvas
          #lousaCanvas
          class="lousa-canvas"
          [class.canvas-ativo]="modoEdicao === 'desenho'"
        ></canvas>

      </div>
    </div>

    <!-- Calha de giz (decorativa) -->
    <div class="chalk-tray" *ngIf="!modoProjetor">
      <span class="chalk chalk--branco"></span>
      <span class="chalk chalk--amarelo"></span>
      <span class="chalk chalk--azul"></span>
      <span class="chalk-eraser"></span>
    </div>

  </div>

</div>
